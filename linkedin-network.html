<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LinkedIn Netwerk</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:       #0d0f0e;
    --surface:  #151918;
    --surface2: #1e2421;
    --border:   #2a332f;
    --text:     #d4dbd7;
    --muted:    #5a6e65;
    --accent:   #7ab89a;
    --persoon:  #8fbcaa;
    --bedrijf:  #c8a87a;
    --sector:   #b87a9f;
    --jaar:     #7a9fb8;
  }
  html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'DM Mono',monospace; }

  #topbar {
    position:fixed; top:0; left:0; right:0; height:42px;
    background:var(--bg); border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:14px; padding:0 18px; z-index:100;
  }
  #title { font-size:13px; color:var(--accent); letter-spacing:.06em; flex-shrink:0; }
  #stats { font-size:10px; color:var(--muted); flex-shrink:0; }
  #filters { display:flex; gap:6px; }

  .btn-filter {
    font-family:'DM Mono',monospace; font-size:10px;
    padding:3px 10px; border-radius:2px; cursor:pointer; border:1px solid var(--border);
    display:flex; align-items:center; gap:5px; background:transparent; color:var(--text);
    transition: opacity .15s;
  }
  .btn-filter .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .btn-filter.off { opacity:.3; }
  .btn-filter.warning { border-color: #c8a87a55; }

  #search-wrap { position:relative; margin-left:auto; }
  #search {
    background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:'DM Mono',monospace; font-size:10px;
    padding:3px 10px; width:220px; border-radius:2px; outline:none;
  }
  #search:focus { border-color:var(--accent); }
  #search::placeholder { color:var(--muted); }
  #search-results {
    display:none; position:absolute; top:calc(100% + 4px); right:0;
    background:var(--surface); border:1px solid var(--border);
    min-width:300px; max-height:360px; overflow-y:auto;
    z-index:200; box-shadow:0 8px 24px rgba(0,0,0,.5);
  }
  #search-results.open { display:block; }
  .sr-item { padding:8px 12px; cursor:pointer; border-bottom:1px solid var(--border); display:flex; align-items:baseline; gap:8px; }
  .sr-item:last-child { border-bottom:none; }
  .sr-item:hover, .sr-item.active { background:var(--surface2); }
  .sr-label { font-size:11px; color:var(--text); flex:1; }
  .sr-label em { color:var(--accent); font-style:normal; }
  .sr-sub { font-size:9px; color:var(--muted); margin-top:1px; }
  .sr-type { font-size:9px; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; flex-shrink:0; }
  .sr-empty { padding:10px 12px; color:var(--muted); font-size:10px; }

  #canvas { position:fixed; top:42px; left:0; right:0; bottom:0; }

  #detail {
    position:fixed; top:42px; right:0; bottom:0; width:320px;
    background:var(--surface); border-left:1px solid var(--border);
    overflow-y:auto; transform:translateX(100%); transition:transform .22s ease; z-index:50;
  }
  #detail.open { transform:translateX(0); }
  #detail-close {
    position:absolute; top:12px; right:14px;
    background:none; border:none; color:var(--muted); font-size:14px; cursor:pointer;
  }
  #detail-close:hover { color:var(--text); }
  #detail-inner { padding:22px 20px 32px; }

  .d-name { font-size:15px; color:var(--text); margin-bottom:4px; line-height:1.3; }
  .d-sub  { font-size:10px; color:var(--muted); letter-spacing:.06em; margin-bottom:18px; }
  .d-section { margin-bottom:18px; }
  .d-section-title { font-size:9px; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:8px; border-bottom:1px solid var(--border); padding-bottom:4px; }
  .d-row { display:flex; justify-content:space-between; font-size:10px; padding:4px 0; border-bottom:1px solid var(--border); color:var(--muted); }
  .d-row span:last-child { color:var(--text); text-align:right; max-width:65%; }
  .person-chip { display:block; padding:6px 10px; margin-bottom:4px; border:1px solid var(--border); cursor:pointer; font-size:10px; }
  .person-chip:hover { border-color:var(--accent); }
  .person-chip .chip-name { color:var(--text); }
  .person-chip .chip-meta { color:var(--muted); font-size:9px; margin-top:2px; }
  .li-link { display:inline-block; margin-top:12px; font-size:10px; color:var(--accent); text-decoration:none; border-bottom:1px solid transparent; }
  .li-link:hover { border-color:var(--accent); }

  #legend { position:fixed; bottom:18px; left:18px; font-size:9px; color:var(--muted); line-height:2; pointer-events:none; }
  .lg-item { display:flex; align-items:center; gap:6px; }
  .lg-dot { width:7px; height:7px; border-radius:50%; }
  #hints { position:fixed; bottom:18px; right:18px; font-size:9px; color:var(--muted); text-align:right; line-height:2; pointer-events:none; }

  .node circle { stroke-width:1.2px; cursor:pointer; }
  .node text { font-family:'DM Mono',monospace; font-size:9px; fill:var(--text); pointer-events:none; }
  .link { stroke-opacity:.2; }
  .node.dimmed circle { opacity:.07; }
  .node.dimmed text   { opacity:.03; }
  .node.hl circle     { stroke-width:2px; }
  .link.hl            { stroke-opacity:.6 !important; }
</style>
</head>
<body>

<div id="topbar">
  <div id="title">LinkedIn Netwerk</div>
  <div id="stats">laden…</div>
  <div id="filters">
    <button class="btn-filter" data-type="bedrijf" onclick="toggleType('bedrijf',this)">
      <span class="dot" style="background:var(--bedrijf)"></span>Bedrijven
    </button>
    <button class="btn-filter" data-type="sector" onclick="toggleType('sector',this)">
      <span class="dot" style="background:var(--sector)"></span>Sector
    </button>
    <button class="btn-filter" data-type="jaar" onclick="toggleType('jaar',this)">
      <span class="dot" style="background:var(--jaar)"></span>Jaar
    </button>
    <button class="btn-filter off warning" id="btn-personen" data-type="persoon" onclick="togglePersonen(this)">
      <span class="dot" style="background:var(--persoon)"></span>Personen
    </button>
  </div>
  <div id="search-wrap">
    <input id="search" type="text" placeholder="zoek persoon of bedrijf…" autocomplete="off">
    <div id="search-results"></div>
  </div>
</div>

<svg id="canvas"></svg>

<div id="detail">
  <button id="detail-close">✕</button>
  <div id="detail-inner"></div>
</div>

<div id="legend">
  <div class="lg-item"><div class="lg-dot" style="background:var(--bedrijf)"></div>Bedrijf (2+ connecties)</div>
  <div class="lg-item"><div class="lg-dot" style="background:var(--sector)"></div>Sector</div>
  <div class="lg-item"><div class="lg-dot" style="background:var(--jaar)"></div>Jaar van connectie</div>
  <div class="lg-item"><div class="lg-dot" style="background:var(--persoon)"></div>Persoon</div>
</div>
<div id="hints">scroll → zoom<br>sleep → bewegen<br>klik node → detail</div>

<script>
const BEDRIJF_MIN = 2;
const COLORS = { persoon:'#8fbcaa', bedrijf:'#c8a87a', sector:'#b87a9f', jaar:'#7a9fb8' };

let W = window.innerWidth, H = window.innerHeight - 42;
let svg, g, nodeLayer, linkLayer, simulation;
let allNodes = [], allLinks = [];
let activeTypes = new Set(['bedrijf','sector','jaar']);
let personenAan = false;
let personMap = {};
let rawConnections = [];

// ─── BUILD GRAPH ────────────────────────────────────────────
function buildGraph(connections, inclPersonen) {
  const nodes = new Map();
  const links = [];

  function node(id, label, type, extra={}) {
    if (!nodes.has(id)) nodes.set(id, { id, label, type, connections:0, personIds:[], ...extra });
    return nodes.get(id);
  }

  const coCount = {};
  for (const c of connections)
    if (c.company) coCount[c.company] = (coCount[c.company]||0)+1;

  // Sector- en jaar-nodes alvast aanmaken
  for (const c of connections) {
    if (c.sector && c.sector !== 'Overig')
      node(`sec:${c.sector}`, c.sector, 'sector');
    if (c.connectedOn) {
      const yr = c.connectedOn.split(' ')[2];
      if (yr) node(`jr:${yr}`, yr, 'jaar');
    }
  }

  if (inclPersonen) {
    // Volledig: persoon → bedrijf + sector + jaar
    for (const c of connections) {
      const name = `${c.firstName} ${c.lastName}`.trim();
      if (!name) continue;
      const pid = `p:${c.url || name}`;
      personMap[pid] = c;
      const pn = node(pid, name, 'persoon', { personRef: c, r: 3.5 });

      const link = (target, type) => {
        pn.connections++;
        target.connections++;
        target.personIds.push(pid);
        links.push({ source: pid, target: target.id, type });
      };

      if (c.company && (coCount[c.company]||0) >= BEDRIJF_MIN)
        link(node(`co:${c.company}`, c.company, 'bedrijf', { coNaam: c.company }), 'bedrijf');
      if (c.sector && c.sector !== 'Overig')
        link(node(`sec:${c.sector}`, c.sector, 'sector'), 'sector');
      if (c.connectedOn) {
        const yr = c.connectedOn.split(' ')[2];
        if (yr) link(node(`jr:${yr}`, yr, 'jaar'), 'jaar');
      }
    }
  } else {
    // Licht: bedrijf → sector + jaar direct gekoppeld via meeste connecties
    const coSector = {}, coJaar = {}, coPersons = {};
    for (const c of connections) {
      const co = c.company || '';
      if (!co || (coCount[co]||0) < BEDRIJF_MIN) continue;
      if (c.sector && c.sector !== 'Overig')
        coSector[co] = coSector[co] || {};
        coSector[co][c.sector] = (coSector[co][c.sector]||0)+1;
      if (c.connectedOn) {
        const yr = c.connectedOn.split(' ')[2];
        if (yr) {
          coJaar[co] = coJaar[co] || {};
          coJaar[co][yr] = (coJaar[co][yr]||0)+1;
        }
      }
      const pid = `p:${c.url || c.firstName+'_'+c.lastName}`;
      personMap[pid] = c;
      coPersons[co] = coPersons[co] || [];
      coPersons[co].push(pid);
    }

    for (const co of Object.keys(coCount).filter(co => coCount[co] >= BEDRIJF_MIN)) {
      const cnt = coCount[co];
      const coNode = node(`co:${co}`, co, 'bedrijf', {
        coNaam: co,
        r: 8 + Math.min(cnt * 0.5, 14),
      });
      coNode.personIds = coPersons[co] || [];
      coNode.connections = cnt;

      // Dominante sector
      if (coSector[co]) {
        const sec = Object.entries(coSector[co]).sort((a,b)=>b[1]-a[1])[0][0];
        const secNode = node(`sec:${sec}`, sec, 'sector');
        secNode.connections++;
        links.push({ source: `co:${co}`, target: `sec:${sec}`, type:'sector' });
      }
      // Meest voorkomende jaar
      if (coJaar[co]) {
        const yr = Object.entries(coJaar[co]).sort((a,b)=>b[1]-a[1])[0][0];
        const jrNode = node(`jr:${yr}`, yr, 'jaar');
        jrNode.connections++;
        links.push({ source: `co:${co}`, target: `jr:${yr}`, type:'jaar' });
      }
    }

    // Sector-nodes schalen op aantal connecties
    const secCount = {};
    for (const c of connections)
      if (c.sector && c.sector !== 'Overig')
        secCount[c.sector] = (secCount[c.sector]||0)+1;
    for (const [,n] of nodes) {
      if (n.type === 'sector') n.r = 14 + Math.min((secCount[n.label]||0)*0.06, 10);
      if (n.type === 'jaar')   n.r = 11;
    }
  }

  return { nodes: [...nodes.values()], links };
}

// ─── INIT ──────────────────────────────────────────────────
function init(connections) {
  rawConnections = connections;
  rebuildAndRender(false);
}

function rebuildAndRender(inclPersonen) {
  const graph = buildGraph(rawConnections, inclPersonen);
  allNodes = graph.nodes;
  allLinks = graph.links;

  const nBedrijven = allNodes.filter(n=>n.type==='bedrijf').length;
  const nPersonen  = rawConnections.length;
  document.getElementById('stats').textContent =
    inclPersonen
      ? `${nPersonen} connecties · ${nBedrijven} bedrijven · ${allNodes.length} nodes`
      : `${nPersonen} connecties · ${nBedrijven} bedrijven · ${allNodes.length} nodes (personen verborgen)`;

  if (!svg) {
    setupSVG();
    initClickHandlers();
  }
  render();
}

// ─── SVG ───────────────────────────────────────────────────
function setupSVG() {
  svg = d3.select('#canvas').attr('width', W).attr('height', H);
  const zoom = d3.zoom().scaleExtent([0.02, 10]).on('zoom', e => g.attr('transform', e.transform));
  svg.call(zoom);
  g = svg.append('g');
}

function initClickHandlers() {
  svg.on('click', () => {
    document.getElementById('detail').classList.remove('open');
    clearHighlight();
    document.getElementById('search-results').classList.remove('open');
  });
  document.getElementById('detail-close').onclick = () => {
    document.getElementById('detail').classList.remove('open');
    clearHighlight();
  };
}

// ─── RENDER ────────────────────────────────────────────────
function render() {
  const vis = new Set(allNodes.filter(n=>activeTypes.has(n.type)).map(n=>n.id));
  const visNodes = allNodes.filter(n=>vis.has(n.id));
  const visLinks = allLinks.filter(l => {
    const s = typeof l.source==='object' ? l.source.id : l.source;
    const t = typeof l.target==='object' ? l.target.id : l.target;
    return vis.has(s) && vis.has(t);
  });

  if (g) g.selectAll('*').remove();
  if (simulation) simulation.stop();

  linkLayer = g.append('g').selectAll('line').data(visLinks).join('line')
    .attr('class','link')
    .attr('stroke', d => {
      const ttype = typeof d.target==='object' ? d.target.type : allNodes.find(n=>n.id===d.target)?.type;
      return COLORS[ttype] || '#fff';
    })
    .attr('stroke-width', 0.7);

  nodeLayer = g.append('g').selectAll('g').data(visNodes, d=>d.id).join('g')
    .attr('class','node')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('click', onNodeClick);

  nodeLayer.append('circle')
    .attr('r', d => d.r || 4)
    .attr('fill', d => COLORS[d.type]||'#888')
    .attr('fill-opacity', d => d.type==='persoon' ? 0.65 : 0.85)
    .attr('stroke', d => COLORS[d.type]||'#888')
    .attr('stroke-opacity', 0.45);

  nodeLayer.filter(d => d.type !== 'persoon')
    .append('text')
    .attr('x', d => (d.r||4)+4).attr('y', 3)
    .text(d => d.label.length > 30 ? d.label.slice(0,28)+'…' : d.label);

  const chargeStr = d => ({ sector:-1200, jaar:-800, bedrijf:-300, persoon:-20 }[d.type]||-30);
  const linkDist  = d => {
    const t = typeof d.target==='object' ? d.target.type : allNodes.find(n=>n.id===d.target)?.type;
    return ({ sector:180, jaar:160, bedrijf:100, persoon:45 }[t])||90;
  };

  simulation = d3.forceSimulation(visNodes)
    .force('link', d3.forceLink(visLinks).id(d=>d.id).distance(linkDist).strength(0.5))
    .force('charge', d3.forceManyBody().strength(chargeStr))
    .force('center', d3.forceCenter(W/2, H/2).strength(0.04))
    .force('collision', d3.forceCollide(d=>(d.r||4)+2))
    .on('tick', () => {
      linkLayer.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
               .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
      nodeLayer.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
}

// ─── HIGHLIGHT ─────────────────────────────────────────────
function highlightNode(d) {
  const connected = new Set([d.id]);
  allLinks.forEach(l => {
    const s = typeof l.source==='object' ? l.source.id : l.source;
    const t = typeof l.target==='object' ? l.target.id : l.target;
    if (s===d.id) connected.add(t);
    if (t===d.id) connected.add(s);
  });
  nodeLayer.classed('dimmed', n=>!connected.has(n.id));
  nodeLayer.classed('hl', n=>connected.has(n.id));
  linkLayer.classed('hl', l=>{
    const s = typeof l.source==='object' ? l.source.id : l.source;
    const t = typeof l.target==='object' ? l.target.id : l.target;
    return s===d.id || t===d.id;
  });
}
function clearHighlight() {
  nodeLayer?.classed('dimmed',false).classed('hl',false);
  linkLayer?.classed('hl',false);
}

// ─── DETAIL ────────────────────────────────────────────────
function onNodeClick(event, d) {
  event.stopPropagation();
  document.getElementById('detail').classList.add('open');
  highlightNode(d);
  if (d.type==='persoon') renderPersoonDetail(d.personRef || personMap[d.id]);
  else renderGroepDetail(d);
}

function esc(s) {
  const el = document.createElement('span');
  el.textContent = s||'';
  return el.innerHTML;
}

function renderPersoonDetail(c) {
  if (!c) return;
  const name = `${c.firstName} ${c.lastName}`.trim();
  document.getElementById('detail-inner').innerHTML = `
    <div class="d-name">${esc(name)}</div>
    <div class="d-sub">connectie</div>
    <div class="d-section">
      ${c.position  ? `<div class="d-row"><span>Functie</span><span>${esc(c.position)}</span></div>` : ''}
      ${c.company   ? `<div class="d-row"><span>Bedrijf</span><span>${esc(c.company)}</span></div>` : ''}
      ${c.sector && c.sector!=='Overig' ? `<div class="d-row"><span>Sector</span><span>${esc(c.sector)}</span></div>` : ''}
      ${c.connectedOn ? `<div class="d-row"><span>Verbonden</span><span>${esc(c.connectedOn)}</span></div>` : ''}
    </div>
    ${c.url ? `<a class="li-link" href="${esc(c.url)}" target="_blank" rel="noopener">↗ Open LinkedIn-profiel</a>` : ''}
  `;
}

function renderGroepDetail(d) {
  const persons = (d.personIds||[])
    .map(pid => personMap[pid])
    .filter(Boolean)
    .sort((a,b)=>`${a.lastName}${a.firstName}`.localeCompare(`${b.lastName}${b.firstName}`));

  const total = d.type==='bedrijf' ? (d.connections||persons.length) : persons.length;
  const typeLabel = { bedrijf:'Bedrijf', sector:'Sector', jaar:'Jaar' }[d.type]||d.type;

  document.getElementById('detail-inner').innerHTML = `
    <div class="d-name">${esc(d.label)}</div>
    <div class="d-sub">${typeLabel} · ${total} connectie${total!==1?'s':''}</div>
    <div class="d-section">
      <div class="d-section-title">Connecties ${!personenAan ? '<span style="color:var(--muted);font-weight:normal">(zet Personen aan voor volledige lijst)</span>' : ''}</div>
      ${persons.length ? persons.map(p => {
        const name = `${p.firstName} ${p.lastName}`.trim();
        const meta = [p.position, p.company].filter(Boolean).join(' · ');
        const pid  = `p:${p.url||name}`;
        return `<div class="person-chip" onclick="openPersonChip('${esc(pid)}')">
          <div class="chip-name">${esc(name)}</div>
          ${meta ? `<div class="chip-meta">${esc(meta)}</div>` : ''}
        </div>`;
      }).join('') : `<div style="font-size:10px;color:var(--muted);padding:8px 0">Zet Personen aan om de ${total} connecties hier te zien.</div>`}
    </div>
  `;
}

function openPersonChip(pid) {
  const c = personMap[pid];
  if (c) renderPersoonDetail(c);
}

// ─── FILTER ────────────────────────────────────────────────
function toggleType(type, btn) {
  if (activeTypes.has(type)) {
    if (activeTypes.size <= 1) return;
    activeTypes.delete(type); btn.classList.add('off');
  } else {
    activeTypes.add(type); btn.classList.remove('off');
  }
  render();
}

function togglePersonen(btn) {
  personenAan = !personenAan;
  if (personenAan) {
    activeTypes.add('persoon'); btn.classList.remove('off');
  } else {
    activeTypes.delete('persoon'); btn.classList.add('off');
  }
  rebuildAndRender(personenAan);
}

// ─── ZOEK ──────────────────────────────────────────────────
const searchEl      = document.getElementById('search');
const searchResults = document.getElementById('search-results');
let activeIdx = -1;

function hilite(str, q) {
  const i = str.toLowerCase().indexOf(q.toLowerCase());
  if (i<0) return esc(str);
  return esc(str.slice(0,i))+'<em>'+esc(str.slice(i,i+q.length))+'</em>'+esc(str.slice(i+q.length));
}

function zoekAlles(q) {
  // Zoek ook in rawConnections (ook als personen uit staan)
  const ql = q.toLowerCase();
  const hits = [];
  const seen = new Set();

  // Eerst nodes in de wolk
  for (const n of allNodes) {
    if (n.label?.toLowerCase().includes(ql) && !seen.has(n.id)) {
      hits.push({ node: n, conn: null });
      seen.add(n.id);
    }
  }
  // Dan personen uit rawConnections (ook als personen-filter uit staat)
  for (const c of rawConnections) {
    const name = `${c.firstName} ${c.lastName}`.trim();
    if (name.toLowerCase().includes(ql)) {
      const pid = `p:${c.url||name}`;
      if (!seen.has(pid)) {
        hits.push({ node: null, conn: c, pid });
        seen.add(pid);
      }
    }
  }
  return hits.slice(0,14);
}

function updateResults(q) {
  activeIdx = -1;
  if (q.length < 2) { searchResults.classList.remove('open'); return; }

  const hits = zoekAlles(q);
  if (!hits.length) {
    searchResults.innerHTML = `<div class="sr-empty">Geen resultaten voor "${esc(q)}"</div>`;
    searchResults.classList.add('open');
    return;
  }

  const TYPE_NL = { persoon:'persoon', bedrijf:'bedrijf', sector:'sector', jaar:'jaar' };
  searchResults.innerHTML = hits.map((h,i) => {
    const label = h.node ? h.node.label : `${h.conn.firstName} ${h.conn.lastName}`.trim();
    const type  = h.node ? h.node.type : 'persoon';
    const sub   = h.conn
      ? [h.conn.position, h.conn.company].filter(Boolean).join(' · ')
      : (h.node?.type !== 'persoon' ? `${h.node.connections||0} connecties` : '');
    return `<div class="sr-item" data-idx="${i}">
      <div style="flex:1;min-width:0">
        <div class="sr-label">${hilite(label,q)}</div>
        ${sub ? `<div class="sr-sub">${esc(sub)}</div>` : ''}
      </div>
      <span class="sr-type">${TYPE_NL[type]||type}</span>
    </div>`;
  }).join('');
  searchResults.classList.add('open');

  searchResults.querySelectorAll('.sr-item').forEach((el,i) => {
    el.addEventListener('mouseenter', () => {
      activeIdx=i;
      searchResults.querySelectorAll('.sr-item').forEach((e,j)=>e.classList.toggle('active',j===i));
    });
    el.addEventListener('click', () => selectHit(hits[i]));
  });
}

function selectHit(h) {
  const label = h.node ? h.node.label : `${h.conn.firstName} ${h.conn.lastName}`.trim();
  searchEl.value = label;
  searchResults.classList.remove('open');

  if (h.node) {
    navigeerNaarNode(h.node);
  } else {
    // Persoon niet in wolk — toon detail direct
    document.getElementById('detail').classList.add('open');
    renderPersoonDetail(h.conn);
  }
}

searchEl.addEventListener('input', () => updateResults(searchEl.value.trim()));
searchEl.addEventListener('keydown', e => {
  const items = searchResults.querySelectorAll('.sr-item');
  if (e.key==='ArrowDown') { e.preventDefault(); activeIdx=Math.min(activeIdx+1,items.length-1); items.forEach((el,j)=>el.classList.toggle('active',j===activeIdx)); }
  else if (e.key==='ArrowUp') { e.preventDefault(); activeIdx=Math.max(activeIdx-1,0); items.forEach((el,j)=>el.classList.toggle('active',j===activeIdx)); }
  else if (e.key==='Enter') { e.preventDefault(); const hits=zoekAlles(searchEl.value.trim()); const idx=activeIdx>=0?activeIdx:0; if(hits[idx]) selectHit(hits[idx]); }
  else if (e.key==='Escape') { searchResults.classList.remove('open'); searchEl.blur(); }
});
document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) searchResults.classList.remove('open');
});

function navigeerNaarNode(node) {
  if (node.x==null) return;
  const scale = node.type==='persoon' ? 3 : 1.8;
  d3.select('#canvas').transition().duration(600)
    .call(d3.zoom().transform, d3.zoomIdentity
      .translate(W/2 - node.x*scale, H/2 - node.y*scale).scale(scale));
  onNodeClick({ stopPropagation:()=>{} }, node);
}

// ─── RESIZE ────────────────────────────────────────────────
window.addEventListener('resize', () => {
  W=window.innerWidth; H=window.innerHeight-42;
  if (svg) svg.attr('width',W).attr('height',H);
  if (simulation) simulation.force('center', d3.forceCenter(W/2,H/2)).alpha(0.3).restart();
});
</script>
